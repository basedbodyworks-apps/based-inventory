services:
  - type: keyvalue
    name: based-inventory-state
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: cron
    name: based-inventory-quantity
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 */6 * * *"
    dockerCommand: python -m based_inventory.jobs.quantity_alerts
    plan: starter
    envVars:
      - key: SHOPIFY_STORE
        sync: false
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_API_VERSION
        value: "2026-01"
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_CHANNEL
        value: C0AK6UGA1NJ
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: STATE_PATH
        fromService:
          type: keyvalue
          name: based-inventory-state
          property: connectionString
      - key: ENV
        value: prod
      - key: DRY_RUN
        value: "1"
      - key: LOG_LEVEL
        value: INFO

  - type: cron
    name: based-inventory-atc
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 13 * * *"
    dockerCommand: python -m based_inventory.jobs.atc_audit
    plan: starter
    envVars:
      - fromService:
          name: based-inventory-quantity
          type: cron
          envVarKey: SHOPIFY_STORE
        key: SHOPIFY_STORE
      - fromService:
          name: based-inventory-quantity
          type: cron
          envVarKey: SHOPIFY_CLIENT_ID
        key: SHOPIFY_CLIENT_ID
      - fromService:
          name: based-inventory-quantity
          type: cron
          envVarKey: SHOPIFY_CLIENT_SECRET
        key: SHOPIFY_CLIENT_SECRET
      - key: SHOPIFY_API_VERSION
        value: "2026-01"
      - fromService:
          name: based-inventory-quantity
          type: cron
          envVarKey: SLACK_BOT_TOKEN
        key: SLACK_BOT_TOKEN
      - key: SLACK_CHANNEL
        value: C0AK6UGA1NJ
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: STATE_PATH
        fromService:
          type: keyvalue
          name: based-inventory-state
          property: connectionString
      - key: ENV
        value: prod
      - key: DRY_RUN
        value: "1"
      - key: LOG_LEVEL
        value: INFO

  - type: cron
    name: based-inventory-weekly
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 16 * * 5"
    dockerCommand: python -m based_inventory.jobs.weekly_snapshot
    plan: starter
    envVars:
      - fromService:
          name: based-inventory-quantity
          type: cron
          envVarKey: SHOPIFY_STORE
        key: SHOPIFY_STORE
      - fromService:
          name: based-inventory-quantity
          type: cron
          envVarKey: SHOPIFY_CLIENT_ID
        key: SHOPIFY_CLIENT_ID
      - fromService:
          name: based-inventory-quantity
          type: cron
          envVarKey: SHOPIFY_CLIENT_SECRET
        key: SHOPIFY_CLIENT_SECRET
      - key: SHOPIFY_API_VERSION
        value: "2026-01"
      - fromService:
          name: based-inventory-quantity
          type: cron
          envVarKey: SLACK_BOT_TOKEN
        key: SLACK_BOT_TOKEN
      - key: SLACK_CHANNEL
        value: C0AK6UGA1NJ
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ENV
        value: prod
      - key: DRY_RUN
        value: "1"
      - key: LOG_LEVEL
        value: INFO
