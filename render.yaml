services:
  - type: keyvalue
    name: based-inventory-state
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

  # Quantity alerts: ShipHero-sourced. Daily 14:00 UTC (7am Pacific).
  # Was every 6h on Shopify; cadence dropped per 2026-04-28 rewire decision.
  - type: cron
    name: based-inventory-quantity
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 14 * * 1-5"
    dockerCommand: python -m based_inventory.jobs.quantity_alerts
    plan: starter
    envVars:
      - key: SHIPHERO_ACCESS_TOKEN
        sync: false
      - key: SHIPHERO_REFRESH_TOKEN
        sync: false
      - key: SHIPHERO_API_URL
        value: https://public-api.shiphero.com/graphql
      # Shopify env vars not used by this job, but Config requires them.
      # Set to placeholders; real values live on the atc_audit service.
      - key: SHOPIFY_STORE
        value: basedbodyworks.myshopify.com
      - key: SHOPIFY_CLIENT_ID
        value: not-used-by-quantity-alerts
      - key: SHOPIFY_CLIENT_SECRET
        value: not-used-by-quantity-alerts
      - key: SHOPIFY_API_VERSION
        value: "2026-01"
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_CHANNEL
        value: C0AK6UGA1NJ
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: STATE_PATH
        fromService:
          type: keyvalue
          name: based-inventory-state
          property: connectionString
      - key: ENV
        value: prod
      - key: DRY_RUN
        value: "0"
      - key: LOG_LEVEL
        value: INFO

  # ATC audit: Shopify-sourced (storefront crawl). Unchanged.
  - type: cron
    name: based-inventory-atc
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 13 * * *"
    dockerCommand: python -m based_inventory.jobs.atc_audit
    plan: starter
    envVars:
      - key: SHOPIFY_STORE
        sync: false
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_API_VERSION
        value: "2026-01"
      # ShipHero not used here, but Config is shared. Pull from quantity service.
      - fromService:
          name: based-inventory-quantity
          type: cron
          envVarKey: SHIPHERO_ACCESS_TOKEN
        key: SHIPHERO_ACCESS_TOKEN
      - fromService:
          name: based-inventory-quantity
          type: cron
          envVarKey: SHIPHERO_REFRESH_TOKEN
        key: SHIPHERO_REFRESH_TOKEN
      - key: SHIPHERO_API_URL
        value: https://public-api.shiphero.com/graphql
      - fromService:
          name: based-inventory-quantity
          type: cron
          envVarKey: SLACK_BOT_TOKEN
        key: SLACK_BOT_TOKEN
      - key: SLACK_CHANNEL
        value: C0AK6UGA1NJ
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: STATE_PATH
        fromService:
          type: keyvalue
          name: based-inventory-state
          property: connectionString
      - key: ENV
        value: prod
      - key: DRY_RUN
        value: "0"
      - key: LOG_LEVEL
        value: INFO

  # Weekly snapshot: ShipHero-sourced. Friday 16:00 UTC (9am Pacific).
  - type: cron
    name: based-inventory-weekly
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 16 * * 5"
    dockerCommand: python -m based_inventory.jobs.weekly_snapshot
    plan: starter
    envVars:
      - fromService:
          name: based-inventory-quantity
          type: cron
          envVarKey: SHIPHERO_ACCESS_TOKEN
        key: SHIPHERO_ACCESS_TOKEN
      - fromService:
          name: based-inventory-quantity
          type: cron
          envVarKey: SHIPHERO_REFRESH_TOKEN
        key: SHIPHERO_REFRESH_TOKEN
      - key: SHIPHERO_API_URL
        value: https://public-api.shiphero.com/graphql
      - key: SHOPIFY_STORE
        value: basedbodyworks.myshopify.com
      - key: SHOPIFY_CLIENT_ID
        value: not-used-by-weekly
      - key: SHOPIFY_CLIENT_SECRET
        value: not-used-by-weekly
      - key: SHOPIFY_API_VERSION
        value: "2026-01"
      - fromService:
          name: based-inventory-quantity
          type: cron
          envVarKey: SLACK_BOT_TOKEN
        key: SLACK_BOT_TOKEN
      - key: SLACK_CHANNEL
        value: C0AK6UGA1NJ
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ENV
        value: prod
      - key: DRY_RUN
        value: "0"
      - key: LOG_LEVEL
        value: INFO
