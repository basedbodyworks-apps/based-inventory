display_information:
  name: Based Inventory
  description: Posts inventory alerts, ATC audit flags, and weekly snapshots to #alerts-inventory
  background_color: "#1a1a1a"
features:
  bot_user:
    display_name: Based Inventory
    always_online: true
oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
